:root{--navy:#1f347d;--blue:#3857c6;--gold:#b88935;--ink:#1c2030;--paper:#faf8f4;--faded:#5f6474;--line:#d7d0c2;--mist:#e9edf8;--white:#fffdf7;--pass:#4a7055;--warn:#b86824}

<script>
// ═══════════════════════════════════════
// 编辑器主逻辑
// ═══════════════════════════════════════

const LIB = (function(){
  try{return JSON.parse(document.getElementById('library-data').textContent.trim())}
  catch(e){return null}
})();

if(!LIB){document.getElementById('main').innerHTML='<div class="empty-state"><h3>数据解析失败</h3><p>请检查 library-data 脚本块中的 JSON 是否有效。</p></div>';throw new Error("Library data parse failed")}

const ALL_CATS = Object.keys(LIB.categoryIndex);
let activeCategory = '运营大类';

function catEntries(cat){return (LIB.categoryIndex[cat]||{}).entries||[]}
function catModels(cat){return (LIB.categoryIndex[cat]||{}).models||[]}
function expById(id){return LIB.experiences.find(function(e){return e.id===id})}
function skillById(id){return LIB.skills.find(function(s){return s.id===id})}

function renderSidebar(){
  var html='';
  ALL_CATS.forEach(function(c){
    var count=catEntries(c).length;
    html+='<button class="cat'+(c===activeCategory?' active':'')+'" onclick="switchCategory(\''+c+'\')">'+c+' <span style="font-size:0.7rem;opacity:0.6">'+count+'</span></button>';
  });
  document.getElementById('sidebar').innerHTML=html;
}

function switchCategory(cat){
  activeCategory=cat;
  renderSidebar();
  renderMain();
}

function renderStats(){
  var total=LIB.experiences.length;
  var interns=LIB.experiences.filter(function(e){return e.type==='internship'}).length;
  var projects=LIB.experiences.filter(function(e){return e.type==='project'}).length;
  var used=LIB.experiences.filter(function(e){return e.usage.timesUsed>0}).length;
  return '<div class="stats">'+
    '<div class="stat"><div class="num">'+total+'</div><div class="lbl">总经历</div></div>'+
    '<div class="stat"><div class="num">'+interns+'</div><div class="lbl">实习</div></div>'+
    '<div class="stat"><div class="num">'+projects+'</div><div class="lbl">项目</div></div>'+
    '<div class="stat"><div class="num">'+used+'</div><div class="lbl">已使用</div></div>'+
    '<div class="stat"><div class="num">'+LIB.skills.length+'</div><div class="lbl">技能</div></div>'+
  '</div>';
}

function renderExperience(entry){
  var usage=entry.usage;
  var usedLabel=usage.timesUsed>0?'<span class="tag used">已使用 '+usage.timesUsed+' 次</span>':'<span class="tag unused">未使用</span>';
  var hasQuant=entry.evidence&&entry.evidence.hasQuantifiedData?' · <span class="s">有量化数据</span>':'';
  var keyMetrics=entry.evidence&&entry.evidence.keyMetrics?'<div>关键指标：'+entry.evidence.keyMetrics+'</div>':'';

  var achHtml='';
  if(entry.type==='project'){
    achHtml=(entry.content.points||[]).map(function(p,i){return '<div class="ach-item"><span class="ach-label">Point '+(i+1)+'</span><span class="ach-text">'+escHtml(p)+'</span></div>'}).join('');
  }else{
    achHtml=(entry.content.achievements||[]).map(function(a){
      return '<div class="ach-item"><span class="ach-label">'+escHtml(a.label)+'</span><span class="ach-text">'+escHtml(a.text)+'</span></div>';
    }).join('');
  }

  var tagsHtml='';
  (entry.tags.capability||[]).forEach(function(t){
    tagsHtml+='<span class="tag cap">'+escHtml(t.role)+' · '+escHtml(t.dimension)+'</span>';
  });
  (entry.tags.industry||[]).forEach(function(i){tagsHtml+='<span class="tag ind">'+escHtml(i)+'</span>'});
  tagsHtml+='<span class="tag lvl">'+escHtml(entry.tags.roleLevel||'')+'</span>';
  tagsHtml+='<span class="tag own">'+escHtml(entry.tags.ownership||'')+'</span>';

  var rewritesHtml='';
  if(entry.rewrites&&entry.rewrites.length){
    rewritesHtml='<fieldset style="margin-top:0.8rem"><legend>累积改写 ('+entry.rewrites.length+')</legend>';
    entry.rewrites.forEach(function(r){
      rewritesHtml+='<div class="rewrite-entry"><span class="rw-date">'+r.date+'</span> · <span class="rw-role">'+escHtml(r.targetRole||'')+'</span> — '+escHtml(r.targetJD||'')+'</div>';
    });
    rewritesHtml+='</fieldset>';
  }

  return '<div class="card" id="card-'+entry.id+'">'+
    '<div class="card-header" onclick="toggleCard(\''+entry.id+'\')">'+
      '<span><span class="title">'+escHtml(entry.source.company||entry.source.title)+'</span> · <span style="color:var(--faded);font-size:0.82rem">'+escHtml(entry.source.role||entry.source.title||'')+'</span></span>'+
      '<span class="meta">'+escHtml(entry.source.period||'')+' · '+usedLabel+'</span>'+
    '</div>'+
    '<div class="card-body">'+
      '<div><strong>ID:</strong> '+entry.id+' · <strong>类型:</strong> '+(entry.type==='project'?'项目':'实习')+' · <strong>证据强度:</strong> '+(entry.evidence?entry.evidence.strength:'')+hasQuant+'</div>'+
      keyMetrics+
      '<div style="margin-top:0.4rem">'+achHtml+'</div>'+
      '<div class="tags-row">'+tagsHtml+'</div>'+
      (entry.notes?'<div style="margin-top:0.4rem;font-size:0.78rem;color:var(--faded)">📝 '+escHtml(entry.notes)+'</div>':'')+
      rewritesHtml+
    '</div>'+
  '</div>';
}

function renderSkills(){
  var html='<h3 style="margin:1rem 0 0.5rem;font-size:0.95rem">专业技能</h3>';
  LIB.skills.forEach(function(s){
    var refs=(s.evidenceRefs||[]).join(', ');
    html+='<div class="skill-row"><span class="sk-label">'+escHtml(s.label)+'</span><span class="sk-text">'+escHtml(s.text)+'</span><span class="sk-pro">'+escHtml(s.proficiency)+'</span></div>';
    html+='<div style="font-size:0.7rem;color:var(--faded);margin:-0.2rem 0 0.3rem 68px">证据引用：'+(refs||'无')+' · 归属：'+escHtml(s.category||'')+'</div>';
  });
  return html;
}

function renderMain(){
  var ids=catEntries(activeCategory);
  var entries=ids.map(expById).filter(Boolean);
  var html=renderStats();
  html+='<div class="cards">';
  entries.forEach(function(e){html+=renderExperience(e)});
  html+='</div>';
  if(entries.length===0)html+='<div class="empty-state"><h3>'+activeCategory+' 为空</h3><p>该大类暂无经历。通过 AI 入库或手动添加来填充。</p></div>';
  html+=renderSkills();
  document.getElementById('main').innerHTML=html;
}

function toggleCard(id){
  var card=document.getElementById('card-'+id);
  if(card)card.classList.toggle('open');
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ═══════════════════════════════════════
// 保存逻辑 — File System Access API
// ═══════════════════════════════════════

async function saveLibrary(){
  var status=document.getElementById('save-status');
  // Serialize updated data back to JSON
  var dataEl=document.getElementById('library-data');
  var updated=JSON.stringify(LIB,null,2);
  var fullHtml=document.documentElement.outerHTML.replace(
    /(<script[^>]*id="library-data"[^>]*>)[\s\S]*?(<\/script>)/,
    '$1\n'+updated+'\n$2'
  );
  status.textContent='正在保存...';

  try{
    // Try File System Access API
    var handle=await window.showOpenFilePicker({types:[{description:'HTML files',accept:{'text/html':['.html']}}],multiple:false});
    var fileHandle=handle[0];
    var writable=await fileHandle.createWritable();
    await writable.write(fullHtml);
    await writable.close();
    status.textContent='已保存 ✓';
    setTimeout(function(){status.textContent=''},3000);
  }catch(e){
    if(e.name==='AbortError'){
      // User cancelled file picker — fall back to download
      var blob=new Blob([fullHtml],{type:'text/html'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');a.href=url;a.download='library.html';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(url);
      status.textContent='已下载 ✓ （浏览器不支持直接写入，请替换原文件）';
    }else{
      status.textContent='保存失败：'+e.message;
    }
  }
}
</script>
