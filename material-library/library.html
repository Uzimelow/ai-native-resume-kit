<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材库</title>
<style>
:root {
  --surface: oklch(98.5% .003 95);
  --panel: oklch(97% .002 260);
  --hover: oklch(96% .004 95);
  --border: oklch(88% .005 90);
  --border-light: oklch(92% .003 90);
  --text: oklch(20% .005 95);
  --text-secondary: oklch(45% .01 90);
  --accent: oklch(52% .16 265);
  --accent-hover: oklch(45% .17 265);
  --accent-subtle: oklch(52% .16 265 / .06);
  --success: oklch(55% .16 142);
  --warning: oklch(62% .18 75);
  --error: oklch(50% .22 25);
  --error-subtle: oklch(50% .22 25 / .06);
  --font-ui: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", -apple-system, sans-serif;
  --radius-sm: 8px;
  --radius-md: 12px;
  --shadow-sm: 0 1px 3px oklch(0% 0 0 / .06);
  --shadow-md: 0 8px 32px oklch(0% 0 0 / .08);
  --ease-out: cubic-bezier(.16, 1, .3, 1);
  --fast: .15s;
  --normal: .22s;
}
*, :before, :after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; font-size: 18px; }
body { font-family: var(--font-ui); color: var(--text); background: var(--surface); line-height: 1.6; min-height: 100vh; }

.container { max-width: 960px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }

/* Header */
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.page-header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -.01em; }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
.tab { font-size: .88rem; font-family: var(--font-ui); padding: .45rem 1.1rem .5rem; border: none; background: none; color: var(--text-secondary); cursor: pointer; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all var(--fast) var(--ease-out); }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Filter row */
.filter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: .85rem; }
.filter-pills { display: flex; gap: .25rem; }
.filter-pill { font-size: .76rem; font-family: var(--font-ui); padding: .28rem .72rem; border-radius: 999px; border: 1px solid var(--border); background: none; color: var(--text-secondary); cursor: pointer; transition: all var(--fast) var(--ease-out); }
.filter-pill:hover { background: var(--hover); color: var(--text); }
.filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Buttons */
.btn { font-size: .8rem; font-family: var(--font-ui); border-radius: var(--radius-sm); cursor: pointer; transition: all var(--fast) var(--ease-out); display: inline-flex; align-items: center; gap: .3rem; padding: .45rem .9rem; font-weight: 500; border: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-ghost { background: none; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--hover); color: var(--text); }
.btn-danger { background: var(--error-subtle); color: var(--error); }
.btn-danger:hover { background: oklch(50% .22 25 / .12); }
.btn-sm { font-size: .72rem; padding: .25rem .6rem; }

/* Entry card */
.entry-card { border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 1rem 1.15rem; margin-bottom: .75rem; background: var(--surface); transition: box-shadow var(--fast) var(--ease-out), border-color var(--fast) var(--ease-out); }
.entry-card:hover { border-color: var(--border); box-shadow: var(--shadow-sm); }
.entry-card.internship { border-left: 3px solid transparent; }
.entry-card.project { border-left: 3px solid transparent; }
.entry-card .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
.entry-card .card-head .info { flex: 1; min-width: 0; }
.entry-card .card-head .info h3 { font-size: .95rem; font-weight: 600; line-height: 1.35; display: flex; align-items: center; gap: .4rem; }
.entry-card .card-head .info .meta { font-size: .76rem; color: var(--text-secondary); margin-top: .15rem; }
.type-badge { font-size: .58rem; font-weight: 600; padding: .1rem .4rem; border-radius: 999px; white-space: nowrap; flex-shrink: 0; letter-spacing: .03em; }
.type-badge.internship { background: oklch(55% .16 142 / .12); color: var(--success); }
.type-badge.project { background: var(--accent-subtle); color: var(--accent); }
.entry-card .card-head .actions { display: flex; gap: .25rem; flex-shrink: 0; }
.entry-card .card-head .card-right { display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }
.entry-card .card-head .card-right .period { font-size: .7rem; color: var(--text-secondary); white-space: nowrap; }
/* Saved flash */
@keyframes saved-flash { 0% { background: var(--accent-subtle); } 100% { background: var(--surface); } }
.entry-card.flash { animation: saved-flash 1.5s var(--ease-out); }

.entry-card .ach-section { margin-top: .6rem; }
.entry-card .ach { display: flex; gap: .3rem; align-items: flex-start; padding: .55rem 0; font-size: .85rem; line-height: 1.65; }
.entry-card .ach + .ach { border-top: 1px solid var(--border-light); }
.entry-card .ach .ach-text { color: var(--text-secondary); flex: 1; }
.entry-card .ach .ach-text strong { color: var(--text); }
.entry-card .ach .ach-actions { display: flex; gap: .15rem; flex-shrink: 0; opacity: .45; transition: opacity var(--fast); }
.entry-card .ach:hover .ach-actions { opacity: 1; }
.ach-add { margin-top: .4rem; }
.ach-add-btn { font-size: .82rem; color: var(--text-secondary); background: none; border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: .4rem .8rem; cursor: pointer; font-family: var(--font-ui); transition: all var(--fast); width: 100%; text-align: center; }
.ach-add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }

/* Skill dimension card */
.dim-card { border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 1rem 1.15rem; margin-bottom: .75rem; background: var(--surface); }
.dim-card .dim-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: .55rem; }
.dim-card .dim-head h3 { font-size: .88rem; font-weight: 600; }
.dim-card .dim-head .dim-actions { display: flex; gap: .25rem; }
.dim-card .sub-skill { display: flex; align-items: baseline; gap: .5rem; padding: .45rem .4rem; font-size: .82rem; border-radius: var(--radius-sm); }
.dim-card .sub-skill:hover { background: var(--hover); }
.dim-card .sub-skill .ss-name { font-weight: 600; min-width: 90px; color: var(--text); }
.dim-card .sub-skill .ss-desc { flex: 1; color: var(--text-secondary); }
.dim-card .sub-skill .ss-prof { font-size: .68rem; font-weight: 600; padding: .1rem .45rem; border-radius: 999px; white-space: nowrap; }
.ss-prof.prof-精通 { background: oklch(55% .16 142 / .15); color: var(--success); }
.ss-prof.prof-熟练 { background: oklch(55% .16 142 / .1); color: var(--success); }
.ss-prof.prof-熟悉 { background: oklch(62% .18 75 / .1); color: var(--warning); }
.ss-prof.prof-了解 { background: oklch(50% .22 25 / .06); color: var(--error); }
.dim-card .sub-skill .ss-actions { display: flex; gap: .15rem; flex-shrink: 0; opacity: .45; transition: opacity var(--fast); }
.dim-card .sub-skill:hover .ss-actions { opacity: 1; }
.dim-add-btn { width: 100%; text-align: center; font-size: .82rem; color: var(--text-secondary); background: none; border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: .4rem .8rem; cursor: pointer; font-family: var(--font-ui); margin-top: .5rem; transition: all var(--fast); }
.dim-add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }

/* Empty */
.empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text-secondary); font-size: .8rem; }

/* Overlay */
.overlay { position: fixed; inset: 0; z-index: 60; background: oklch(0% 0 0 / .4); display: flex; justify-content: center; align-items: flex-start; padding-top: 8vh; overflow-y: auto; }
.overlay-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.5rem; width: 90%; max-width: 640px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-md); }
.overlay-panel h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
.form-group { margin-bottom: .8rem; }
.form-group label { display: block; font-size: .76rem; font-weight: 500; color: var(--text-secondary); margin-bottom: .2rem; }
.form-group input, .form-group textarea, .form-group select { width: 100%; font-size: .88rem; font-family: var(--font-ui); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .5rem .6rem; background: var(--surface); outline: none; transition: border-color var(--fast); }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
.ach-edit-block { border: 1px solid var(--border-light); border-radius: var(--radius-sm); padding: .7rem; margin-bottom: .6rem; background: var(--panel); }
.ach-edit-block .ach-edit-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: .35rem; }
.ach-edit-block input { font-size: .82rem !important; }
.ach-edit-block textarea { font-size: .82rem !important; min-height: 80px; line-height: 1.55; overflow: hidden; resize: none; }
.ach-edit-block textarea:focus { overflow: auto; resize: vertical; }
.form-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1rem; }

@media (max-width: 600px) {
  .container { padding: 1rem .75rem 3rem; }
  .overlay-panel { padding: 1.25rem; }
}
</style>

<script>
// ═══ Parse ═══
var LIB;
(function() {
  try { LIB = JSON.parse(document.getElementById('library-data').textContent.trim()); }
  catch(e) { document.getElementById('app').innerHTML = '<div class="empty-state">数据解析失败</div>'; throw e; }
})();
if (!LIB) throw new Error('Parse failed');

// ═══ State ═══
var activeTab = 'entries'; // 'entries' | 'skills'
var entryFilter = '全部';  // '全部' | '实习' | '项目'
var editingEntry = null;   // null | entry object (null = create new)
var editingAchIdx = null;  // for inline achievement editing
var editingDim = null;     // dimension name being edited
var editingSkill = null;   // { dimName, idx } for sub-skill being edited
var deleteConfirm = null;

// ═══ Helpers ═══
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function genId() { return 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6); }

// ═══ Entry filtering ═══
function filtered() {
  if (entryFilter === '全部') return LIB.experiences;
  var t = entryFilter === '实习' ? 'internship' : 'project';
  return LIB.experiences.filter(function(e) { return e.type === t; });
}
function sorted(entries) {
  return entries.slice().sort(function(a, b) {
    if (a.type !== b.type) return a.type === 'internship' ? -1 : 1;
    var ap = a.source.period || '', bp = b.source.period || '';
    var am = ap.match(/(\d{4})/), bm = bp.match(/(\d{4})/);
    var ay = am ? +am[1] : 0, by = bm ? +bm[1] : 0;
    return by - ay;
  });
}

// ═══ Skill helpers ═══
function ensureSkillDimensions() {
  if (!LIB.skillDimensions) LIB.skillDimensions = [];
}
function findSkillInDim(dimName, skillName) {
  var dim = LIB.skillDimensions.find(function(d) { return d.name === dimName; });
  if (!dim) return -1;
  return dim.items.findIndex(function(s) { return s.name === skillName; });
}

// ═══ Render ═══
function render() {
  var app = document.getElementById('app');
  app.innerHTML = renderHeader() + renderTabs() + renderBody();
  if (deleteConfirm) renderDeleteConfirm();
  if (editingEntry !== null) renderEntryEditor();
  if (editingDim !== null || editingSkill !== null) renderSkillEditor();
}

function renderHeader() {
  return '<div class="page-header"><h1>素材库</h1>' +
    (activeTab === 'entries'
      ? '<button class="btn btn-primary" onclick="startNewEntry()">+ 新增素材</button>'
      : '<button class="btn btn-primary" onclick="startNewDim()">+ 新增能力大类</button>') +
    '</div>';
}

function renderTabs() {
  var tabs = [{ id: 'entries', label: '素材条目' }, { id: 'skills', label: '技能画像' }];
  var h = '<div class="tabs">';
  tabs.forEach(function(t) {
    h += '<button class="tab' + (activeTab === t.id ? ' active' : '') + '" onclick="switchTab(\'' + t.id + '\')">' + t.label + '</button>';
  });
  h += '</div>';
  return h;
}

function switchTab(t) { activeTab = t; editingEntry = null; editingDim = null; editingSkill = null; render(); }

function renderBody() {
  if (activeTab === 'entries') return renderEntries();
  return renderSkills();
}

// ═══ ENTRIES TAB ═══
function renderEntries() {
  var entries = sorted(filtered());
  var h = '<div class="filter-row"><div class="filter-pills">';
  ['全部', '实习', '项目'].forEach(function(f) {
    var cnt = f === '全部' ? LIB.experiences.length : LIB.experiences.filter(function(e) { return e.type === (f === '实习' ? 'internship' : 'project'); }).length;
    h += '<button class="filter-pill' + (entryFilter === f ? ' active' : '') + '" onclick="setFilter(\'' + f + '\')">' + f + ' (' + cnt + ')</button>';
  });
  h += '</div></div>';
  if (!entries.length) return h + '<div class="empty-state">暂无素材，点击右上角「+ 新增素材」开始</div>';
  entries.forEach(function(e) { h += renderEntryCard(e); });
  return h;
}
function setFilter(f) { entryFilter = f; render(); }

function renderEntryCard(e) {
  var achievements = e.content.achievements || [];
  var achHtml = '';
  achievements.forEach(function(a, i) {
    achHtml += '<div class="ach">' +
      '<span class="ach-text"><strong>' + esc(a.label) + '：</strong>' + esc(a.text) + '</span>' +
      '<span class="ach-actions">' +
        '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editAchievement(\'' + e.id + '\',' + i + ')">编辑</button>' +
        '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteAchievement(\'' + e.id + '\',' + i + ')" style="color:var(--error)">删除</button>' +
      '</span>' +
    '</div>';
  });
  var companyName = e.source.company || e.source.title || '未命名';
  var roleWithDept = (e.type === 'internship' ? '<span class="type-badge internship">实习</span>' : '<span class="type-badge project">项目</span>') + esc(companyName);
  if (e.source.role) roleWithDept += ' · ' + esc(e.source.role);

  return '<div class="entry-card ' + (e.type === 'internship' ? 'internship' : 'project') + '" id="card-' + e.id + '">' +
    '<div class="card-head">' +
      '<div class="info">' +
        '<h3>' + roleWithDept + '</h3>' +
      '</div>' +
      '<div class="card-right">' +
        (e.source.period ? '<span class="period">' + esc(e.source.period) + '</span>' : '') +
        '<div class="actions">' +
          '<button class="btn btn-ghost btn-sm" onclick="startEditEntry(\'' + e.id + '\')">编辑</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="confirmDeleteEntry(\'' + e.id + '\')" style="color:var(--error)">删除</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="ach-section">' + achHtml + '</div>' +
  '</div>';
}

// ═══ SKILLS TAB ═══
function renderSkills() {
  ensureSkillDimensions();
  var dims = LIB.skillDimensions;
  if (!dims.length) return '<div class="empty-state">暂无技能画像，点击右上角「+ 新增能力大类」开始</div>';
  var h = '';
  dims.forEach(function(d) {
    h += '<div class="dim-card">' +
      '<div class="dim-head">' +
        '<h3>' + esc(d.name) + ' <span style="font-weight:400;color:var(--text-secondary);font-size:.7rem">' + (d.items||[]).length + ' 项</span></h3>' +
        '<div class="dim-actions">' +
          '<button class="btn btn-ghost btn-sm" onclick="startEditDim(\'' + esc(d.name) + '\')">重命名</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="confirmDeleteDim(\'' + esc(d.name) + '\')" style="color:var(--error)">删除</button>' +
        '</div>' +
      '</div>';
    (d.items || []).forEach(function(s, i) {
      h += '<div class="sub-skill">' +
        '<span class="ss-name">' + esc(s.name) + '</span>' +
        '<span class="ss-prof prof-' + esc(s.proficiency || '') + '">' + esc(s.proficiency || '') + '</span>' +
        '<span class="ss-desc">' + esc(s.description || '') + '</span>' +
        '<span class="ss-actions">' +
          '<button class="btn btn-ghost btn-sm" onclick="startEditSkill(\'' + esc(d.name) + '\',' + i + ')">编辑</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="deleteSkill(\'' + esc(d.name) + '\',' + i + ')" style="color:var(--error)">删除</button>' +
        '</span>' +
      '</div>';
    });
    h += '<button class="dim-add-btn" onclick="startNewSkill(\'' + esc(d.name) + '\')">+ 新增子技能</button>';
    h += '</div>';
  });
  return h;
}

// ═══ ENTRY EDITOR OVERLAY ═══
function startNewEntry() {
  editingEntry = {
    id: genId(),
    type: 'internship',
    source: { company: '', role: '', period: '' },
    content: { achievements: [{ label: '', text: '' }] }
  };
  render();
}
function startEditEntry(id) {
  var e = LIB.experiences.find(function(x) { return x.id === id; });
  if (!e) return;
  editingEntry = JSON.parse(JSON.stringify(e));
  if (!editingEntry.content.achievements || !editingEntry.content.achievements.length) editingEntry.content.achievements = [{ label: '', text: '' }];
  render();
}
function closeEditor() { editingEntry = null; removeOverlays(); render(); }
function removeOverlays() { var ovs = document.querySelectorAll('.overlay'); for (var i = 0; i < ovs.length; i++) ovs[i].remove(); }

function renderEntryEditor() {
  var e = editingEntry;
  var isNew = !LIB.experiences.some(function(x) { return x.id === e.id; });
  var ov = document.createElement('div');
  ov.className = 'overlay';
  ov.onclick = function(ev) { if (ev.target === ov) closeEditor(); };

  var h = '<div class="overlay-panel"><h2>' + (isNew ? '新增素材' : '编辑素材') + '</h2>';

  // Type
  h += '<div class="form-group"><label>类型</label><select id="ef-type" onchange="onEntryTypeChange()">' +
    '<option value="internship"' + (e.type==='internship'?' selected':'') + '>实习</option>' +
    '<option value="project"' + (e.type==='project'?' selected':'') + '>项目</option>' +
    '</select></div>';

  // Company / Project title
  h += '<div class="form-group"><label>' + (e.type==='project'?'项目名称':'公司') + '</label>' +
    '<input id="ef-company" value="' + esc(e.type==='project'?(e.source.title||''):(e.source.company||'')) + '" placeholder="' + (e.type==='project'?'项目名称':'公司名') + '"></div>';

  // Role
  h += '<div class="form-group"><label>岗位</label>' +
    '<input id="ef-role" value="' + esc(e.source.role||'') + '" placeholder="岗位名"></div>';

  // Period
  h += '<div class="form-group"><label>时间段</label>' +
    '<input id="ef-period" value="' + esc(e.source.period||'') + '" placeholder="如 2025.08-2025.11"></div>';

  // Achievements — unified vertical layout
  h += '<div class="form-group"><label>Achievements</label>';
  var achs = e.content.achievements || [{ label: '', text: '' }];
  achs.forEach(function(a, i) {
    h += '<div class="ach-edit-block">' +
      '<div class="ach-edit-hd">' +
        '<span style="font-size:.72rem;color:var(--text-secondary);font-weight:600">#' + (i+1) + '</span>' +
        (achs.length > 1 ? '<button class="btn btn-ghost btn-sm" onclick="removeAchievement(' + i + ')" style="color:var(--error)">删除</button>' : '') +
      '</div>' +
      '<input id="ef-alabel-' + i + '" value="' + esc(a.label||'') + '" placeholder="成果标签（5-12字）" style="margin-bottom:.3rem">' +
      '<textarea id="ef-atext-' + i + '" placeholder="STAR 描述——情况 → 任务 → 动作 → 结果（含量化数据）" style="min-height:80px">' + esc(a.text||'') + '</textarea>' +
    '</div>';
  });
  h += '</div>';
	  h += '<button class="ach-add-btn" onclick="addAchievement()">+ 新增 achievement</button>';

  h += '<div class="form-actions">' +
    '<button class="btn btn-ghost" onclick="closeEditor()">取消</button>' +
    '<button class="btn btn-primary" onclick="saveEntry()">保存</button>' +
  '</div></div>';

  ov.innerHTML = h;
  document.body.appendChild(ov);
  // Auto-resize textareas to show full content
  var tas = ov.querySelectorAll('textarea');
  for (var ti = 0; ti < tas.length; ti++) {
    (function(ta) {
      ta.style.height = 'auto';
      ta.style.height = (ta.scrollHeight + 2) + 'px';
      ta.addEventListener('input', function() {
        ta.style.height = 'auto';
        ta.style.height = (ta.scrollHeight + 2) + 'px';
      });
    })(tas[ti]);
  }
}

function onEntryTypeChange() {
  var sel = document.getElementById('ef-type');
  editingEntry.type = sel.value;
  if (!editingEntry.content.achievements) editingEntry.content.achievements = [{ label: '', text: '' }];
  closeEditor();
  render();
  renderEntryEditor();
}
function addAchievement() {
  editingEntry.content.achievements.push({ label: '', text: '' });
  removeOverlays(); renderEntryEditor();
}
function removeAchievement(i) {
  editingEntry.content.achievements.splice(i, 1);
  removeOverlays(); renderEntryEditor();
}

function saveEntry() {
  var e = editingEntry;
  e.type = document.getElementById('ef-type').value;
  var compVal = document.getElementById('ef-company').value.trim();
  // Unified: both internships and projects use source.title/company for display
  if (e.type === 'project') { e.source.title = compVal; }
  else { e.source.company = compVal; }
  e.source.role = document.getElementById('ef-role').value.trim();
  e.source.period = document.getElementById('ef-period').value.trim();

  // Unified achievements
  var achs = [];
  var ai = 0;
  while (document.getElementById('ef-alabel-' + ai)) {
    var al = document.getElementById('ef-alabel-' + ai).value.trim();
    var at = document.getElementById('ef-atext-' + ai).value.trim();
    if (al || at) achs.push({ label: al, text: at });
    ai++;
  }
  e.content.achievements = achs.length ? achs : [{ label: '', text: '' }];
  delete e.content.points;

  // Upsert
  var idx = LIB.experiences.findIndex(function(x) { return x.id === e.id; });
  if (idx >= 0) LIB.experiences[idx] = e;
  else LIB.experiences.push(e);

  var savedId = e.id;
  editingEntry = null;
  render();
  // Flash the saved card
  var card = document.getElementById('card-' + savedId);
  if (card) { card.classList.add('flash'); setTimeout(function() { card.classList.remove('flash'); }, 1500); }
}

// ═══ Inline achievement edit ═══
function editAchievement(entryId, achIdx) {
  var original = LIB.experiences.find(function(x) { return x.id === entryId; });
  if (!original) return;
  // Clone first, then append empty achievement if needed — never mutate original
  editingEntry = JSON.parse(JSON.stringify(original));
  if (!editingEntry.content.achievements) editingEntry.content.achievements = [];
  if (achIdx >= editingEntry.content.achievements.length) {
    editingEntry.content.achievements.push({ label: '', text: '' });
  }
  render();
  renderEntryEditor();
}
function deleteAchievement(entryId, achIdx) {
  var e = LIB.experiences.find(function(x) { return x.id === entryId; });
  if (!e) return;
  var achs = e.content.achievements || [];
  if (achs.length <= 1) return;
  deleteConfirm = { type: 'achievement', entryId: entryId, achIdx: achIdx };
  render();
}

// ═══ Delete confirm ═══
function confirmDeleteEntry(id) { deleteConfirm = { type: 'entry', id: id }; render(); }
function confirmDeleteDim(name) { deleteConfirm = { type: 'dim', name: name }; render(); }
function cancelDelete() { deleteConfirm = null; render(); }
function executeDelete() {
  if (!deleteConfirm) return;
  if (deleteConfirm.type === 'entry') {
    LIB.experiences = LIB.experiences.filter(function(e) { return e.id !== deleteConfirm.id; });
  } else if (deleteConfirm.type === 'dim') {
    LIB.skillDimensions = LIB.skillDimensions.filter(function(d) { return d.name !== deleteConfirm.name; });
  } else if (deleteConfirm.type === 'achievement') {
    var e = LIB.experiences.find(function(x) { return x.id === deleteConfirm.entryId; });
    if (e && e.content.achievements) e.content.achievements.splice(deleteConfirm.achIdx, 1);
  }
  deleteConfirm = null;
  render();
}
function renderDeleteConfirm() {
  var ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = '<div class="overlay-panel" style="max-width:320px"><p style="font-size:.85rem;margin-bottom:1rem">确定删除？此操作不可撤销。</p>' +
    '<div class="form-actions"><button class="btn btn-ghost" onclick="cancelDelete()">取消</button><button class="btn btn-danger" onclick="executeDelete()">删除</button></div></div>';
  document.body.appendChild(ov);
}

// ═══ Skill editors ═══
function startNewDim() {
  editingDim = { name: '', items: [] };
  editingSkill = null;
  render();
}
function startEditDim(dimName) {
  var d = LIB.skillDimensions.find(function(x) { return x.name === dimName; });
  if (!d) return;
  editingDim = JSON.parse(JSON.stringify(d));
  editingSkill = null;
  render();
}
function startNewSkill(dimName) {
  editingSkill = { dimName: dimName, idx: -1, skill: { name: '', proficiency: '熟悉', description: '' } };
  editingDim = null;
  render();
}
function startEditSkill(dimName, idx) {
  var d = LIB.skillDimensions.find(function(x) { return x.name === dimName; });
  if (!d || !d.items[idx]) return;
  editingSkill = { dimName: dimName, idx: idx, skill: JSON.parse(JSON.stringify(d.items[idx])) };
  editingDim = null;
  render();
}
function deleteSkill(dimName, idx) {
  var d = LIB.skillDimensions.find(function(x) { return x.name === dimName; });
  if (!d) return;
  d.items.splice(idx, 1);
  render();
}
function closeSkillEditor() { editingDim = null; editingSkill = null; removeOverlays(); render(); }

function renderSkillEditor() {
  var ov = document.createElement('div');
  ov.className = 'overlay';
  ov.onclick = function(ev) { if (ev.target === ov) closeSkillEditor(); };

  var h = '<div class="overlay-panel" style="max-width:480px">';
  if (editingDim !== null) {
    var isNewDim = !LIB.skillDimensions.some(function(d) { return d.name === editingDim.name; });
    h += '<h2>' + (isNewDim ? '新增能力大类' : '重命名能力大类') + '</h2>';
    h += '<div class="form-group"><label>能力大类名称</label><input id="sk-dim-name" value="' + esc(editingDim.name||'') + '" placeholder="如 数据分析能力"></div>';
    h += '<div class="form-actions">' +
      '<button class="btn btn-ghost" onclick="closeSkillEditor()">取消</button>' +
      '<button class="btn btn-primary" onclick="saveDim()">保存</button></div>';
  } else if (editingSkill !== null) {
    var isNew = editingSkill.idx < 0;
    h += '<h2>' + (isNew ? '新增子技能' : '编辑子技能') + '</h2>';
    h += '<div class="form-group"><label>所属能力大类</label><input disabled value="' + esc(editingSkill.dimName) + '"></div>';
    h += '<div class="form-group"><label>技能名称</label><input id="sk-name" value="' + esc(editingSkill.skill.name||'') + '" placeholder="如 SQL"></div>';
    h += '<div class="form-group"><label>熟练度</label><select id="sk-prof">' +
      ['了解','熟悉','熟练','精通'].map(function(p) { return '<option value="' + p + '"' + (editingSkill.skill.proficiency===p?' selected':'') + '>' + p + '</option>'; }).join('') +
      '</select></div>';
    h += '<div class="form-group"><label>描述</label><textarea id="sk-desc" placeholder="应用场景或能力说明">' + esc(editingSkill.skill.description||'') + '</textarea></div>';
    h += '<div class="form-actions">' +
      '<button class="btn btn-ghost" onclick="closeSkillEditor()">取消</button>' +
      '<button class="btn btn-primary" onclick="saveSkill()">保存</button></div>';
  }
  h += '</div>';
  ov.innerHTML = h;
  document.body.appendChild(ov);
}

function saveDim() {
  ensureSkillDimensions();
  var name = document.getElementById('sk-dim-name').value.trim();
  if (!name) return;
  if (editingDim.name && editingDim.name !== name) {
    // Rename: update existing
    var d = LIB.skillDimensions.find(function(x) { return x.name === editingDim.name; });
    if (d) d.name = name;
  } else if (!editingDim.name) {
    // New: add
    if (LIB.skillDimensions.some(function(d) { return d.name === name; })) return; // duplicate
    LIB.skillDimensions.push({ name: name, items: [] });
  }
  editingDim = null;
  render();
}
function saveSkill() {
  ensureSkillDimensions();
  var dim = LIB.skillDimensions.find(function(d) { return d.name === editingSkill.dimName; });
  if (!dim) return;
  var s = {
    name: document.getElementById('sk-name').value.trim(),
    proficiency: document.getElementById('sk-prof').value,
    description: document.getElementById('sk-desc').value.trim()
  };
  if (!s.name) return;
  if (editingSkill.idx >= 0) {
    dim.items[editingSkill.idx] = s;
  } else {
    if (dim.items.some(function(x) { return x.name === s.name; })) return; // duplicate
    dim.items.push(s);
  }
  editingSkill = null;
  render();
}

// ═══ Init ═══
render();

</script>
</body>
</html>
